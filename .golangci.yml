version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    misspell:
      locale: US
  exclusions:
    # paths 是 Go 正则而非 glob，`**` 会直接让 lint 报配置错误退出
    paths:
      - '(^|/)logs($|/)'
      - '(^|/)node_modules($|/)'
      - '(^|/)dist($|/)'
