global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警闭环：规则 → Alertmanager → notify webhook 站内信（rules/alerts.yml）。
# 脚手架未含 notify-service 时 Alertmanager 投递失败仅记日志，规则评估不受影响。
rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["go-admin-kit-alertmanager:9093"]

scrape_configs:
  # 主机指标（磁盘/内存/CPU，node_exporter 挂 / 只读）
  - job_name: node
    static_configs:
      - targets:
          - go-admin-kit-node-exporter:9100

  - job_name: go-admin-kit-backend
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - go-admin-kit-monitor:8081  # monitor 服务承载 /api/v1/metrics（原 backend 命名已不存在）

  # 全部业务服务的 HTTP/runtime/DB 池指标（shared/pkg/metrics 统一中间件，
  # 端点 /metrics 只在容器网络内可达，网关不路由）。service 标签用于看板聚合。
  - job_name: go-admin-kit-services
    metrics_path: /metrics
    static_configs:
      - targets: ["go-admin-kit-auth:8082"]
        labels: { service: auth }
      - targets: ["go-admin-kit-identity:8083"]
        labels: { service: identity }
      - targets: ["go-admin-kit-system:8084"]
        labels: { service: system }
      - targets: ["go-admin-kit-audit:8085"]
        labels: { service: audit }
      - targets: ["go-admin-kit-file:8086"]
        labels: { service: file }
      - targets: ["go-admin-kit-bpm:8096"]
        labels: { service: bpm }
