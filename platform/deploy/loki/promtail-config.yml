# promtail：采集本机全部 docker 容器 stdout → Loki。
# 用 docker_sd 自动发现，容器名做 service 标签（compose 容器名与 swarm task 名都归一）。
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://go-admin-kit-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # 容器名（去掉前导 /）；swarm task 名形如 gak_cc-service.1.xxx → 取服务段
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [container]
        regex: (?:gak_)?([a-zA-Z0-9-]+?)(?:-service)?(?:\.\d+\..+)?$
        target_label: service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
