<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="algolia-site-verification" content="F83830458D62489E" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>GopherForge</title>
    <script>
      // 首屏前应用已保存的主题，避免闪烁
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('app_theme') === 'light' ? 'light' : 'dark'
      } catch (e) {}
    </script>
    <style>
      html { background: #0a0b14; color-scheme: dark; }
      html[data-theme='light'] { background: #edf3fb; color-scheme: light; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
