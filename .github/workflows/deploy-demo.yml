name: deploy-demo

# 把前端以「演示模式」（纯前端假数据，见 web/src/demo/）发布到 GitHub Pages，
# 并把 VitePress 文档站（website/）合并发布到同站 /docs/ 子路径。
on:
  push:
    branches: [main]
    paths:
      - 'microservices/web/**'
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: microservices/web/package-lock.json
      - name: 安装依赖
        working-directory: microservices/web
        run: npm ci
      - name: 演示模式构建
        working-directory: microservices/web
        env:
          VITE_DEMO: '1'
          VITE_BASE: /gopherforge/
        run: npm run build
      - name: 深链接预渲染（每路由一份 index.html，直链返回 200）
        working-directory: microservices/web
        run: node scripts/prerender-spa.mjs
      - name: 未知路径 404 兜底
        run: cp microservices/web/dist/index.html microservices/web/dist/404.html
      - name: 文档站依赖
        working-directory: website
        run: npm ci
      - name: 文档站构建（VitePress → /docs/ 子路径）
        working-directory: website
        run: npm run build
      - name: 推送 Algolia 搜索索引（自建管道，替代 crawler；缺 secret 自动跳过）
        working-directory: website
        env:
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
        run: node scripts/algolia-index.mjs
      - name: 合并文档站产物
        run: cp -r website/.vitepress/dist microservices/web/dist/docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: microservices/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
