name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  workspace:
    name: Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Workspace scripts
        working-directory: microservices
        run: |
          npm run api:contract
          npm run test:contract
          npm run test:smoke:unit
      - name: Check generated OpenAPI is committed
        run: git diff --exit-code -- microservices/legacy-backend/docs/openapi.json tdesign-vue-go/src/api/generated/schema.d.ts

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/legacy-backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: microservices/legacy-backend/go.sum

      - run: go mod download
      - run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Summarize Go coverage
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          {
            echo "### Go coverage"
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - run: go vet ./...
      - run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run --config ../../.golangci.yml ./...

  auth-service:
    name: Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/services/auth
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: microservices/services/auth/go.sum

      - run: go mod download
      - run: go test ./...
      - run: go vet ./...

  identity-service:
    name: Identity Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/services/identity
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: microservices/services/identity/go.sum

      - run: go mod download
      - run: go test ./...
      - run: go vet ./...

  system-service:
    name: System Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/services/system
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: microservices/services/system/go.sum

      - run: go mod download
      - run: go test ./...
      - run: go vet ./...

  audit-service:
    name: Audit Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/services/audit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: microservices/services/audit/go.sum

      - run: go mod download
      - run: go test ./...
      - run: go vet ./...

  file-service:
    name: File Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/services/file
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: microservices/services/file/go.sum

      - run: go mod download
      - run: go test ./...
      - run: go vet ./...

  # Full-stack smoke: build every compose image, boot the whole stack
  # (Traefik gateway + 5 microservices + monolith + postgres/redis/nats +
  # frontend) and drive tests/api-smoke.mjs through the gateway on :8000.
  # The monolith is losing most of its routes, so direct-connect smoke on
  # :8081 no longer covers the API surface — only the gateway composition does.
  ai-service:
    name: AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/services/ai
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: microservices/services/ai/go.sum

      - run: go mod download
      - run: go test ./...
      - run: go vet ./...

  # Full-stack smoke: build every compose image, boot the whole stack
  # (Traefik gateway + 5 microservices + monolith + postgres/redis/nats +
  # frontend) and drive tests/api-smoke.mjs through the gateway on :8000.
  # The monolith is losing most of its routes, so direct-connect smoke on
  # :8081 no longer covers the API surface — only the gateway composition does.
  integration:
    name: Integration Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - workspace
      - backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: microservices/legacy-backend/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: docker/setup-buildx-action@v3

      # Build the six Go images + frontend via buildx bake so layers persist
      # in the GitHub Actions cache between runs. Tags must match the image
      # names docker compose derives for build-only services
      # (<project>-<service>, project pinned to go-admin-kit by the compose
      # `name:` field) so `up` below reuses the loaded images instead of
      # rebuilding without cache.
      - name: Build compose images
        uses: docker/bake-action@v7
        with:
          source: microservices
          files: docker-compose.yml
          load: true
          provenance: false
          set: |
            backend.tags=go-admin-kit-backend:latest
            backend.cache-from=type=gha,scope=compose-backend
            backend.cache-to=type=gha,scope=compose-backend,mode=max,ignore-error=true
            auth-service.tags=go-admin-kit-auth-service:latest
            auth-service.cache-from=type=gha,scope=compose-auth
            auth-service.cache-to=type=gha,scope=compose-auth,mode=max,ignore-error=true
            identity-service.tags=go-admin-kit-identity-service:latest
            identity-service.cache-from=type=gha,scope=compose-identity
            identity-service.cache-to=type=gha,scope=compose-identity,mode=max,ignore-error=true
            system-service.tags=go-admin-kit-system-service:latest
            system-service.cache-from=type=gha,scope=compose-system
            system-service.cache-to=type=gha,scope=compose-system,mode=max,ignore-error=true
            audit-service.tags=go-admin-kit-audit-service:latest
            audit-service.cache-from=type=gha,scope=compose-audit
            audit-service.cache-to=type=gha,scope=compose-audit,mode=max,ignore-error=true
            file-service.tags=go-admin-kit-file-service:latest
            file-service.cache-from=type=gha,scope=compose-file
            file-service.cache-to=type=gha,scope=compose-file,mode=max,ignore-error=true
            frontend.tags=go-admin-kit-frontend:latest
            frontend.cache-from=type=gha,scope=compose-frontend
            frontend.cache-to=type=gha,scope=compose-frontend,mode=max,ignore-error=true

      - name: Start postgres, redis and NATS
        working-directory: microservices
        run: docker compose up -d --wait --wait-timeout 180 go-admin-kit-postgres go-admin-kit-redis go-admin-kit-nats

      # Schema and seed data (including the default admin account the smoke
      # logs in with) both live in the goose migrations. The rehearsal first
      # exercises up/down/up on a scratch database, then the real compose
      # database is migrated — same mechanism as the old direct-connect job,
      # pointed at the compose postgres (localhost:5432, compose defaults).
      # The backend image re-runs `migrate up` at boot; a no-op by then.
      - name: Apply migrations and seed data
        working-directory: microservices/legacy-backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
          DB_USER: postgres
          DB_PASSWORD: '123456'
          DB_NAME: go_admin_kit
          DB_SSLMODE: disable
        run: |
          go mod download
          go run ./cmd/migration-rehearsal -config ./configs/config.yaml -dir ./migrations -database go_admin_kit_ci_migration_rehearsal
          go run ./cmd/migrate -config ./configs/config.yaml -dir ./migrations up

      - name: Start the full stack behind the Traefik gateway
        working-directory: microservices
        run: docker compose up -d --wait --wait-timeout 300

      - name: Run API smoke through the gateway
        working-directory: microservices
        env:
          API_BASE_URL: http://127.0.0.1:8000/api/v1
        run: |
          npm run test:smoke:unit
          npm run smoke:api

      - name: Dump compose state and logs
        if: failure()
        working-directory: microservices
        run: |
          docker compose ps -a || true
          docker compose logs --tail=100 || true
          echo '::group::gateway (Traefik) log incl. access log'
          docker compose logs --no-log-prefix --tail=300 gateway || true
          echo '::endgroup::'

      - name: Tear down the stack
        if: always()
        working-directory: microservices
        run: docker compose down -v --remove-orphans

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: microservices/web/package-lock.json

      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm run build
